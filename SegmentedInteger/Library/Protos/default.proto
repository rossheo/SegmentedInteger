syntax = "proto3";

package pb;

message SortedSetInteger
{
	message Chunk
	{
		message BitmapChunk
		{
			enum ChunkLimit
			{
				ChunkLimit_None = 0;
				ChunkLimit_Max = 64;
			};

			optional int64 start = 1;
			bytes bit_increments = 2;	// start 값으로부터의 증가분 bits (1 ~ 63)
			bool filled = 3;			// true인 경우 구간 전체 채움 (bit_increments 삭제)
		}

		message IncrementChunk
		{
			enum ChunkLimit
			{
				ChunkLimit_None = 0;
				ChunkLimit_Max = 2000000;
			};

			optional int64 start = 1;
			repeated int64 increments = 2;	// start 값으로부터의 증가분 리스트 (1 ~ 1,999,999)
		}

		oneof chunks_oneof
		{
			BitmapChunk bitmap_chunk = 1;
			IncrementChunk increment_chunk = 2;
		}
	}

	repeated Chunk chunks = 1;
}

message BlockedInteger
{
	message Block
	{
		message ConstantBlock
		{
			sint64 value = 1;
			int32 count = 2;
		}

		message ArithmeticBlock
		{
			sint64 first = 1;
			sint64 step = 2;
			int32 count = 3;
		}

		message AscendingBitmapBlock
		{
			sint64 first = 1;
			uint64 bits = 2;	// bit i(0-indexed, 0~62) 세트 → first+i+1 값 존재
		}

		message AscendingBlock
		{
			enum DiffsLimit
			{
				DiffsLimit_None = 0;
				DiffsLimit_Max = 8191;
			}
			sint64 first = 1;
			repeated uint64 diffs = 2;	// 오름차순: next - prev (양수)
		}

		message DescendingBitmapBlock
		{
			sint64 first = 1;
			uint64 bits = 2;	// bit i(0-indexed, 0~62) 세트 → first-i-1 값 존재
		}

		message DescendingBlock
		{
			enum DiffsLimit
			{
				DiffsLimit_None = 0;
				DiffsLimit_Max = 8191;
			}
			sint64 first = 1;
			repeated uint64 diffs = 2;	// 내림차순: prev - next (양수)
		}

		message DeltaOfDeltaBlock
		{
			enum DeltaLimit
			{
				DeltaLimit_None = 0;
				DeltaLimit_Max = 8191;
			}
			sint64 first = 1;
			sint64 first_delta = 2;
			repeated sint64 delta_of_deltas = 3;
		}

		message DeltaBlock
		{
			enum RangeLimit
			{
				RangeLimit_None = 0;
				RangeLimit_Max = 16382;
			}
			sint64 reference = 1;
			repeated sint64 deltas = 2;
		}

		message BitPackedBlock
		{
			sint64 min_value = 1;
			uint32 bit_width = 2;
			uint32 count = 3;
			bytes packed_data = 4;
		}

		oneof block_oneof
		{
			ConstantBlock constant = 1;
			ArithmeticBlock arithmetic = 2;
			AscendingBitmapBlock ascending_bitmap = 3;
			AscendingBlock ascending = 4;
			DescendingBitmapBlock descending_bitmap = 5;
			DescendingBlock descending = 6;
			DeltaOfDeltaBlock delta_of_delta = 7;
			DeltaBlock delta = 8;
			BitPackedBlock bit_packed = 9;
		}
	}

	repeated Block blocks = 1;
}
